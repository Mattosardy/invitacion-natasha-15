<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lista de Invitados | Natasha 15 Años</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-card {
            background: #0f0a0c;
            border-radius: 25px;
            padding: 25px;
            border: 1px solid #e94560;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 5px;
            font-size: 1.8em;
        }
        .subtitle {
            text-align: center;
            color: #c9c9c9;
            margin-bottom: 25px;
            font-size: 0.8em;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            background: rgba(233,69,96,0.2);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            min-width: 100px;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            font-size: 0.8em;
            color: #c9c9c9;
        }
        .form-agregar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .form-agregar input {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #e94560;
            border-radius: 30px;
            color: #fff;
            font-size: 0.9em;
            min-width: 120px;
        }
        .form-agregar select {
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #e94560;
            border-radius: 30px;
            color: #fff;
            font-size: 0.9em;
            min-width: 80px;
        }
        .form-agregar button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #e94560;
            border-radius: 30px;
            color: #fff;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #e94560;
            color: #fff;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(233,69,96,0.3);
        }
        .nombre-pendiente {
            color: #e94560;
            font-weight: bold;
        }
        .nombre-confirmado {
            color: #00ff00;
            font-weight: bold;
        }
        .send-invite-btn {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7em;
            font-weight: bold;
        }
        .send-invite-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 8px rgba(37,211,102,0.5);
        }
        .export-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560, #8b0000);
            color: #fff;
            border: none;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: #fff;
            border: none;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }
        .reset-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,152,0,0.5);
        }
        .cantidad-badge {
            background: rgba(233,69,96,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            margin-left: 8px;
            color: #e94560;
        }
        @media (max-width: 700px) {
            th, td { font-size: 0.7em; padding: 8px; }
            .form-agregar { flex-direction: column; }
            .stats { flex-direction: column; }
            .send-invite-btn { padding: 4px 8px; font-size: 0.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-card">
            <h1>🎸 PANEL DE CONTROL 🎸</h1>
            <div class="subtitle">Lista de invitados - 15 años Natasha</div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalInvitados">0</div>
                    <div class="stat-label">Total Registros</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalPersonas">0</div>
                    <div class="stat-label">Total Personas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalConfirmados">0</div>
                    <div class="stat-label">Confirmados</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalPendientes">0</div>
                    <div class="stat-label">Pendientes</div>
                </div>
            </div>
            <div class="form-agregar">
                <input type="text" id="newNombre" placeholder="Nombre completo">
                <input type="tel" id="newTelefono" placeholder="Teléfono (ej: 091950107)">
                <select id="newCantidad">
                    <option value="1">+0 personas (solo él/ella)</option>
                    <option value="2">+1 persona</option>
                    <option value="3">+2 personas</option>
                    <option value="4">+3 personas</option>
                    <option value="5">+4 personas</option>
                    <option value="6">+5 personas</option>
                    <option value="7">+6 personas</option>
                </select>
                <button id="agregarBtn">➕ Agregar</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o teléfono...">
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Teléfono</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="invitadosList"></tbody>
                </table>
            </div>
            <button class="export-btn" id="exportBtn">📥 Exportar lista a Excel</button>
            <button class="reset-btn" id="resetBtn">🔄 RESTABLECER LISTA COMPLETA</button>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'listaInvitadosNatasha';
        let listaInvitados = [];
        const invitadosIniciales = [
            { nombre: "prueba_uno", telefono: "99999999", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Estrella_Alvarez", telefono: "98036490", cantidad: 2, confirmado: false, fechaConfirmacion: null },
            { nombre: "Edardo_Melgarejo", telefono: "97155420", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Solange_Aguirre", telefono: "94633919", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Luis_Cardozo", telefono: "95624113", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Marta_Correa", telefono: "93774623", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Estela_Silva", telefono: "94342362", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Sandra_Chavez", telefono: "94611825", cantidad: 4, confirmado: false, fechaConfirmacion: null },
            { nombre: "Ana_Sastre", telefono: "95128887", cantidad: 4, confirmado: false, fechaConfirmacion: null },
            { nombre: "Jorge_Mederos", telefono: "98488813", cantidad: 3, confirmado: false, fechaConfirmacion: null },
            { nombre: "Andrea_Reynoso", telefono: "99301955", cantidad: 2, confirmado: false, fechaConfirmacion: null },
            { nombre: "Richard_Rodriguez", telefono: "94889342", cantidad: 3, confirmado: false, fechaConfirmacion: null },
            { nombre: "Matias_Arballo", telefono: "91950107", cantidad: 4, confirmado: false, fechaConfirmacion: null },
            { nombre: "Carolina_Gomez", telefono: "97105789", cantidad: 2, confirmado: false, fechaConfirmacion: null },
            { nombre: "Sebastian_Revello", telefono: "95002373", cantidad: 4, confirmado: false, fechaConfirmacion: null },
            { nombre: "Agustina_Laguna", telefono: "97044055", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Martina_Sosa", telefono: "93822793", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Avril_Giossi", telefono: "93821704", cantidad: 3, confirmado: false, fechaConfirmacion: null },
            { nombre: "Luana_Montero", telefono: "97139839", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Sophia_De_Almeida", telefono: "93894516", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Mahia_Larrosa", telefono: "97790304", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Kiara_Mazza", telefono: "96421850", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Julieta_Gamarra", telefono: "94416690", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Julieta_Ortiz", telefono: "91415835", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Victoria_Garrido", telefono: "97397058", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Oriana_Conde", telefono: "99169526", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Luana_Olivera", telefono: "98143558", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Ailem_Gonzalez", telefono: "95394799", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Melina_Leyes", telefono: "96884182", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Chelsea_Ifran", telefono: "98719332", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Sabrina_Soria", telefono: "92311391", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Byron_Arbelo", telefono: "92409688", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Aaron_Guevara", telefono: "97754583", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Ezequiel_Vazquez", telefono: "94213659", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Demian_Riguetti", telefono: "96098087", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Diego_Gutierrez", telefono: "98714294", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Luciana_Alvez", telefono: "97311165", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Valentina_Aguiar", telefono: "92281522", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Valentina_Maquiola", telefono: "94214501", cantidad: 1, confirmado: false, fechaConfirmacion: null },
            { nombre: "Felipe_Guzman", telefono: "93500221", cantidad: 1, confirmado: false, fechaConfirmacion: null }
        ];
        function guardarListaLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(listaInvitados)); }
        function cargarLista() {
            const guardada = localStorage.getItem(STORAGE_KEY);
            if (guardada) { listaInvitados = JSON.parse(guardada); actualizarTabla(); }
            else { listaInvitados = JSON.parse(JSON.stringify(invitadosIniciales)); guardarListaLocal(); actualizarTabla(); }
        }
        function enviarInvitacionPorWhatsApp(index) {
            const invitado = listaInvitados[index];
            if (!invitado) return;
            const enlace = `https://mattosardy.github.io/invitacion-natasha-15/?nombre=${invitado.nombre}`;
            const mensaje = `🎸 *INVITACIÓN 15 AÑOS - NATASHA* 🎸%0a%0a¡Hola ${invitado.nombre}!%0a%0a📅 *Fecha:* Sábado 13 de Junio 2026%0a🕗 *Hora:* 22:00 a 05:00%0a📍 *Lugar:* Nuevo Salón Azul, José Belloni 3342%0a👗 *Código:* Vestimenta negra (exclusiva para la quinceañera)%0a%0a🔗 *Confirmá tu asistencia acá:*%0a${enlace}%0a%0a¡Te esperamos! 🎉`;
            window.open(`https://wa.me/${invitado.telefono}?text=${mensaje}`, '_blank');
        }
        function agregarInvitado() {
            const nombre = document.getElementById('newNombre').value.trim();
            const telefono = document.getElementById('newTelefono').value.trim();
            const cantidad = parseInt(document.getElementById('newCantidad').value);
            if (!nombre || !telefono) { alert('Completá nombre y teléfono'); return; }
            listaInvitados.push({ nombre, telefono, cantidad, confirmado: false, fechaConfirmacion: null });
            guardarListaLocal(); actualizarTabla();
            document.getElementById('newNombre').value = ''; document.getElementById('newTelefono').value = '';
            alert(`✅ ${nombre} agregado correctamente`);
        }
        function actualizarTabla() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = listaInvitados.filter(i => i.nombre.toLowerCase().includes(searchTerm) || i.telefono.includes(searchTerm));
            const tbody = document.getElementById('invitadosList');
            if (!tbody) return;
            if (filtrados.length === 0) { tbody.innerHTML = '<td><td colspan="3" style="text-align:center">No hay invitados</td</tr>'; }
            else {
                tbody.innerHTML = filtrados.map((inv, idx) => {
                    const originalIndex = listaInvitados.findIndex(i => i === inv);
                    const mostrarNombre = inv.cantidad > 1 ? `${inv.nombre} +${inv.cantidad - 1}` : inv.nombre;
                    const nombreClase = inv.confirmado ? 'nombre-confirmado' : 'nombre-pendiente';
                    return `
                        <tr>
                            <td class="${nombreClase}">${mostrarNombre} <span class="cantidad-badge">${inv.cantidad} pers</span></td>
                            <td>${inv.telefono || '-'}</td>
                            <td><button class="send-invite-btn" onclick="enviarInvitacionPorWhatsApp(${originalIndex})">📲 Invitar</button></td>
                        </tr>
                    `;
                }).join('');
            }
            const total = listaInvitados.length;
            const totalPersonas = listaInvitados.reduce((s, i) => s + i.cantidad, 0);
            const confirmados = listaInvitados.filter(i => i.confirmado).length;
            document.getElementById('totalInvitados').textContent = total;
            document.getElementById('totalPersonas').textContent = totalPersonas;
            document.getElementById('totalConfirmados').textContent = confirmados;
            document.getElementById('totalPendientes').textContent = total - confirmados;
        }
        function exportarExcel() {
            let csv = "Nombre,Teléfono,Cantidad Personas,Estado\n";
            listaInvitados.forEach(i => {
                const n = i.cantidad > 1 ? `${i.nombre} +${i.cantidad - 1}` : i.nombre;
                csv += `"${n}","${i.telefono}",${i.cantidad},${i.confirmado ? "CONFIRMADO" : "PENDIENTE"}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "invitados_natasha.csv";
            link.click();
        }
        function restablecerLista() {
            if (confirm('⚠️ ¿Restablecer la lista? Se perderán los cambios manuales.')) {
                listaInvitados = JSON.parse(JSON.stringify(invitadosIniciales));
                guardarListaLocal(); actualizarTabla();
                alert('✅ Lista restablecida');
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('agregarBtn').addEventListener('click', agregarInvitado);
            document.getElementById('searchInput').addEventListener('input', actualizarTabla);
            document.getElementById('exportBtn').addEventListener('click', exportarExcel);
            document.getElementById('resetBtn').addEventListener('click', restablecerLista);
            cargarLista();
        });
    </script>
</body>
</html>
