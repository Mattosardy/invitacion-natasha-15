<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lista de Invitados | Natasha 15 Años</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-card {
            background: #0f0a0c;
            border-radius: 25px;
            padding: 25px;
            border: 1px solid #e94560;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 5px;
            font-size: 1.8em;
        }
        .subtitle {
            text-align: center;
            color: #c9c9c9;
            margin-bottom: 25px;
            font-size: 0.8em;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            background: rgba(233,69,96,0.2);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            min-width: 100px;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            font-size: 0.8em;
            color: #c9c9c9;
        }
        .form-agregar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .form-agregar input {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #e94560;
            border-radius: 30px;
            color: #fff;
            font-size: 0.9em;
            min-width: 120px;
        }
        .form-agregar select {
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #e94560;
            border-radius: 30px;
            color: #fff;
            font-size: 0.9em;
            min-width: 80px;
        }
        .form-agregar button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #e94560;
            border-radius: 30px;
            color: #fff;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #e94560;
            color: #fff;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(233,69,96,0.3);
            color: #e0e0e0;
        }
        .confirmado {
            color: #00ff00;
            font-weight: bold;
        }
        .pendiente {
            color: #e94560;
            font-weight: bold;
        }
        .send-invite-btn {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7em;
            font-weight: bold;
        }
        .send-invite-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 8px rgba(37,211,102,0.5);
        }
        .export-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560, #8b0000);
            color: #fff;
            border: none;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: #fff;
            border: none;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }
        .reset-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,152,0,0.5);
        }
        .cantidad-badge {
            background: rgba(233,69,96,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            margin-left: 8px;
            color: #e94560;
        }
        @media (max-width: 700px) {
            th, td { font-size: 0.7em; padding: 8px; }
            .form-agregar { flex-direction: column; }
            .stats { flex-direction: column; }
            .send-invite-btn { padding: 4px 8px; font-size: 0.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-card">
            <h1>🎸 PANEL DE CONTROL 🎸</h1>
            <div class="subtitle">Lista de invitados - 15 años Natasha</div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalInvitados">0</div>
                    <div class="stat-label">Total Registros</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalPersonas">0</div>
                    <div class="stat-label">Total Personas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalConfirmados">0</div>
                    <div class="stat-label">Confirmados</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalPendientes">0</div>
                    <div class="stat-label">Pendientes</div>
                </div>
            </div>

            <div class="form-agregar">
                <input type="text" id="newNombre" placeholder="Nombre completo">
                <input type="tel" id="newTelefono" placeholder="Teléfono (ej: 091950107)">
                <select id="newCantidad">
                    <option value="1">+0 personas (solo él/ella)</option>
                    <option value="2">+1 persona</option>
                    <option value="3">+2 personas</option>
                    <option value="4">+3 personas</option>
                    <option value="5">+4 personas</option>
                    <option value="6">+5 personas</option>
                    <option value="7">+6 personas</option>
                </select>
                <button id="agregarBtn">➕ Agregar</button>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o teléfono...">
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Teléfono</th><th>Estado</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="invitadosList"></tbody>
                </table>
            </div>

            <button class="export-btn" id="exportBtn">📥 Exportar lista a Excel</button>
            <button class="reset-btn" id="resetBtn">🔄 RESTABLECER LISTA COMPLETA</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN - REEMPLAZÁ TU URL AQUÍ
        // ==========================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhQjxF8OUcUx1ouSMQMnrn-X6XtRhLKE0IhhazWve8uLw_9o1myIss0pzCgwEy0ty3/exec";
        const STORAGE_KEY = 'listaInvitadosNatasha';
        let listaInvitados = [];

        // ==========================================
        // CARGAR LISTA DESDE APPS SCRIPT
        // ==========================================
        async function cargarLista() {
            console.log('🔄 Cargando desde Apps Script...');
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=listar&t=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    listaInvitados = data.map(inv => ({
                        nombre: inv.nombre,
                        telefono: inv.telefono?.toString() || "",
                        cantidad: parseInt(inv.cantidad_personas) || 1,
                        confirmado: inv.confirmado === "SI",
                        fechaConfirmacion: inv.fecha_confirmacion || null
                    }));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(listaInvitados));
                    actualizarTabla();
                    console.log('✅ Datos cargados desde Apps Script:', listaInvitados.length);
                }
            } catch (error) {
                console.error('❌ Error cargando desde Apps Script:', error);
                const guardada = localStorage.getItem(STORAGE_KEY);
                if (guardada) {
                    listaInvitados = JSON.parse(guardada);
                    actualizarTabla();
                    console.log('⚠️ Usando datos de localStorage');
                }
            }
        }

        // ==========================================
        // AGREGAR INVITADO
        // ==========================================
        async function agregarInvitado() {
            const nombreInput = document.getElementById('newNombre');
            const telefonoInput = document.getElementById('newTelefono');
            const cantidadSelect = document.getElementById('newCantidad');
            
            if (!nombreInput || !telefonoInput || !cantidadSelect) {
                console.error('No se encontraron los elementos del formulario');
                return;
            }
            
            const nombre = nombreInput.value.trim();
            const telefono = telefonoInput.value.trim();
            const cantidad = parseInt(cantidadSelect.value);
            
            if (!nombre || !telefono) {
                alert('Completá nombre y teléfono');
                return;
            }
            
            try {
                const nuevoInvitado = {
                    action: 'agregar',
                    datos: {
                        nombre: nombre,
                        telefono: telefono,
                        cantidad_personas: cantidad.toString()
                    }
                };
                
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoInvitado)
                });
                
                const resultado = await response.json();
                
                if (resultado.success) {
                    alert(`✅ ${nombre} agregado correctamente`);
                    nombreInput.value = '';
                    telefonoInput.value = '';
                    cargarLista();
                } else {
                    alert('❌ Error al agregar: ' + (resultado.message || ''));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error de conexión');
            }
        }

        // ==========================================
        // ENVIAR INVITACIÓN POR WHATSAPP
        // ==========================================
        function enviarInvitacionPorWhatsApp(index) {
            const invitado = listaInvitados[index];
            if (!invitado) return;
            
            let nombreSimplificado = invitado.nombre.split(' y ')[0].split(' +')[0].replace(/\s+/g, '-');
            const nombreCodificado = encodeURIComponent(nombreSimplificado);
            const enlace = `https://mattosardy.github.io/invitacion-natasha-15/?nombre=${nombreCodificado}`;
            const mensaje = `🎸 *INVITACIÓN 15 AÑOS - NATASHA* 🎸%0a%0a¡Hola ${invitado.nombre}!%0a%0aTe invito a celebrar mis 15 años.%0a%0a📅 *Fecha:* Sábado 13 de Junio 2026%0a🕗 *Hora:* 22:00 a 05:00%0a📍 *Lugar:* Nuevo Salón Azul, José Belloni 3342%0a👗 *Código:* Vestimenta negra (exclusiva para la quinceañera)%0a%0a🔗 *Confirmá tu asistencia acá:*%0a${enlace}%0a%0a¡Te esperamos! 🎉`;
            window.open(`https://wa.me/${invitado.telefono}?text=${mensaje}`, '_blank');
        }

        // ==========================================
        // ACTUALIZAR TABLA
        // ==========================================
        function actualizarTabla() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            const filtrados = listaInvitados.filter(i => 
                i.nombre.toLowerCase().includes(searchTerm) || 
                i.telefono.includes(searchTerm)
            );
            
            const tbody = document.getElementById('invitadosList');
            if (!tbody) return;
            
            if (filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">No hay invitados</tr</tr>';
            } else {
                tbody.innerHTML = filtrados.map((inv, idx) => {
                    const originalIndex = listaInvitados.findIndex(i => i === inv);
                    const fecha = inv.fechaConfirmacion ? new Date(inv.fechaConfirmacion).toLocaleString() : '-';
                    const mostrarNombre = inv.cantidad > 1 ? `${inv.nombre} +${inv.cantidad - 1}` : inv.nombre;
                    return `
                        <tr>
                            <td>${mostrarNombre} <span class="cantidad-badge">${inv.cantidad} pers</span></td>
                            <td>${inv.telefono}</td>
                            <td class="${inv.confirmado ? 'confirmado' : 'pendiente'}">
                                ${inv.confirmado ? '✅ CONFIRMADO' : '⏳ PENDIENTE'}
                                ${inv.confirmado ? `<br><small>${fecha}</small>` : ''}
                            </td>
                            <td>${!inv.confirmado ? `<button class="send-invite-btn" onclick="enviarInvitacionPorWhatsApp(${originalIndex})">📲 Enviar invitación</button>` : '—'}</td>
                        </tr>
                    `;
                }).join('');
            }

            const totalInvitadosSpan = document.getElementById('totalInvitados');
            const totalPersonasSpan = document.getElementById('totalPersonas');
            const totalConfirmadosSpan = document.getElementById('totalConfirmados');
            const totalPendientesSpan = document.getElementById('totalPendientes');
            
            if (totalInvitadosSpan) totalInvitadosSpan.textContent = listaInvitados.length;
            if (totalPersonasSpan) totalPersonasSpan.textContent = listaInvitados.reduce((sum, inv) => sum + inv.cantidad, 0);
            const confirmados = listaInvitados.filter(i => i.confirmado).length;
            if (totalConfirmadosSpan) totalConfirmadosSpan.textContent = confirmados;
            if (totalPendientesSpan) totalPendientesSpan.textContent = listaInvitados.length - confirmados;
        }

        // ==========================================
        // EXPORTAR A EXCEL
        // ==========================================
        function exportarExcel() {
            let csv = "Nombre,Teléfono,Cantidad Personas,Estado,Fecha Confirmación\n";
            listaInvitados.forEach(i => {
                const nombreMostrar = i.cantidad > 1 ? `${i.nombre} +${i.cantidad - 1}` : i.nombre;
                csv += `"${nombreMostrar}","${i.telefono}",${i.cantidad},${i.confirmado ? "CONFIRMADO" : "PENDIENTE"},"${i.fechaConfirmacion || ''}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "invitados_natasha.csv";
            link.click();
        }

        function restablecerLista() {
            if (confirm('⚠️ ¿Restablecer la lista? Se recargarán los datos desde Google Sheets.')) {
                cargarLista();
            }
        }

        // ==========================================
        // INICIALIZAR CUANDO EL DOM ESTÉ LISTO
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔧 Inicializando admin...');
            
            const agregarBtn = document.getElementById('agregarBtn');
            const searchInput = document.getElementById('searchInput');
            const exportBtn = document.getElementById('exportBtn');
            const resetBtn = document.getElementById('resetBtn');

            if (agregarBtn) agregarBtn.addEventListener('click', agregarInvitado);
            if (searchInput) searchInput.addEventListener('input', actualizarTabla);
            if (exportBtn) exportBtn.addEventListener('click', exportarExcel);
            if (resetBtn) resetBtn.addEventListener('click', restablecerLista);
            
            cargarLista();
            setInterval(cargarLista, 5000);
        });
    </script>
</body>
</html>
